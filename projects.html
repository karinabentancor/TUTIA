<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUTÍA / PROYECTOS</title>
 <meta name="description" content="TUTÍA — ESTUDIO CREATIVO Montevideo, Uruguay.">
  <meta property="og:title" content="TUTÍA / PROYECTOS">
  <meta property="og:description" content="ESTUDIO CREATIVO Montevideo, Uruguay.">
  <meta property="og:image" content="https://tutía.uy/img/back.png">
  <link rel="icon" type="image/png" href="img/favicon.png">
<link rel="stylesheet" href="css/projects.css">
</head>
<body>

<header>
  <a href="index.html" class="back-btn">←</a>
  <div class="header-right">
    <span class="header-sep">/</span>
    <span class="header-section">PROYECTOS</span>
  </div>
</header>

<div class="page">
  <div class="hero">
    <div class="hero-eyebrow">TUTÍA — ESTUDIO CREATIVO</div>
    <div class="hero-title">QUÉ<br>HACE<br>MOS<span>.</span></div>
  </div>

  <div class="services" id="services"></div>

  <div class="cta">
    <div class="cta-text">¿Tenés un<br>proyecto<span>?</span></div>
    <a href="#" class="cta-link" id="cta-btn">ESCRIBINOS</a>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <form id="contact-form">
      <div class="modal-field" style="margin-bottom:20px">
        <div class="modal-title" style="margin-bottom:10px">TU MAIL</div>
        <input class="modal-input" id="field-email" type="email" required placeholder="nombre@mail.com">
      </div>
      <div class="modal-field" style="margin-bottom:0">
        <div class="modal-title" style="margin-bottom:10px">MENSAJE</div>
        <textarea class="modal-textarea" id="field-message" required placeholder="Contanos sobre tu proyecto..."></textarea>
      </div>
      <button class="modal-submit" id="modal-submit" type="submit">ENVIAR</button>
      <div class="modal-status" id="modal-status"></div>
    </form>
  </div>
</div>

<a href="estudio.html" class="floating-tab estudio">ESTUDIO</a>
<a href="events.html" class="floating-tab eventos">EVENTOS</a>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init('qV_IRVWDmbi5Zgtbh')

const SERVICES = [
  { title: ['DISEÑO', 'DIGITAL'],        desc: 'Gráfica que no pide permiso. Para proyectos que tienen algo que decir.' },
  { title: ['DISEÑO', 'WEB'],            desc: 'Sitios web sin compromisos de forma. Diseñados desde lo que sos.' },
  { title: ['DISEÑO', 'EDITORIAL'],      desc: 'Diseño editorial para los que saben que un buen libro habla antes de abrirlo.' },
  { title: ['PRODUCCIÓN', 'DE EVENTOS'], desc: 'Desde la idea hasta que se apagan las luces. Un evento es mil decisiones y nos encargamos de todas.' },
  { title: ['DISEÑO DE', 'EXPOSICIONES'],desc: 'La obra puede ser cualquier cosa. El diseño también.' },
]

const list = document.getElementById('services')
SERVICES.forEach(s => {
  const row = document.createElement('div')
  row.className = 's-row'
  row.innerHTML = `<div class="s-title"><span class="w1">${s.title[0]}</span> <span class="w2">${s.title[1]}</span></div><div class="s-desc">${s.desc}</div>`
  list.appendChild(row)
})

const overlay   = document.getElementById('modal-overlay')
const form      = document.getElementById('contact-form')
const status    = document.getElementById('modal-status')
const submitBtn = document.getElementById('modal-submit')

document.getElementById('cta-btn').addEventListener('click', e => {
  e.preventDefault()
  overlay.classList.add('open')
})

function closeModal() {
  overlay.classList.remove('open')
  form.reset()
  status.textContent = ''
  status.className = 'modal-status'
}

document.getElementById('modal-close').addEventListener('click', closeModal)

overlay.addEventListener('click', e => {
  if (e.target === overlay) closeModal()
})

form.addEventListener('submit', async e => {
  e.preventDefault()
  submitBtn.disabled = true
  submitBtn.textContent = 'ENVIANDO...'
  status.textContent = ''

  try {
    const fromEmail = document.getElementById('field-email').value
    const message   = document.getElementById('field-message').value
    await emailjs.send('service_869lk5h', 'template_7ad5hrd', {
      from_email: fromEmail,
      message:    message,
      to_email:   'tutiaestudio@gmail.com'
    })
    await emailjs.send('service_869lk5h', 'template_1og5rje', {
      from_email: fromEmail,
      message:    message,
      to_email:   fromEmail
    })
    status.textContent = 'MENSAJE ENVIADO.'
    status.className = 'modal-status ok'
    form.reset()
  } catch {
    status.textContent = 'ERROR. INTENTÁ DE NUEVO.'
    status.className = 'modal-status err'
  } finally {
    submitBtn.disabled = false
    submitBtn.textContent = 'ENVIAR'
  }
})
</script>
</body>
</html>
