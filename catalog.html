<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TUTÍA — CLUB DE LIBROS</title>
  <meta name="description" content="TUTÍA — ESTUDIO CREATIVO Montevideo, Uruguay.">
  <meta property="og:title" content="TUTÍA — CLUB DE LIBROS">
  <meta property="og:description" content="ESTUDIO CREATIVO Montevideo, Uruguay.">
  <meta property="og:image" content="https://tutía.uy/img/back.png">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="css/catalog.css" />
</head>
<body>

  <nav class="site-nav">
    <div class="nav-row-1">
      <a href="index.html" class="back-btn">←</a>
      <img src="svg/TUTIALOGO.svg" alt="TUTÍA" class="header-logo">
      <div class="nav-row-1-right">
        <span class="header-sep">/</span>
        <span class="header-section">CLUB DE LIBROS</span>
      </div>
    </div>

    <div class="nav-row-2">
      <div class="availability-switch">
        <div class="switch-option active" id="all-books">TODOS</div>
        <div class="switch-option" id="available-books">DISPONIBLES</div>
      </div>

      <input type="text" id="search" placeholder="TÍTULO O AUTOR" />

      <select id="editorial">
        <option value="all" selected disabled hidden>EDITORIAL</option>
      </select>

      <select id="category">
        <option value="all" selected disabled hidden>CATEGORÍA</option>
      </select>

      <button class="button-dark" onclick="window.location.href='packs.html'">
        VER PACKS
      </button>

      <button class="button-subasta" onclick="window.location.href='subasta.html'">
        SUBASTA
      </button>
    </div>
  </nav>

  <div class="main-container">

    <main class="content">
      <div id="catalog"></div>
    </main>

    <aside class="right-aside">
      <a href="index.html">
        <img src="svg/TUTÍA_b.svg" alt="Logo" class="logo" />
      </a>
      <div class="aside-bottom">
        <ul class="selected-list"></ul>
      </div>
    </aside>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
