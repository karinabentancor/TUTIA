<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TUTÍA / SUBASTA</title>
  <style>
    :root {
      --red: #cc0000;
      --black: #000;
      --white: #fff;
      --gray: #ddd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: monospace;
      background: var(--white);
      color: var(--black);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background-image: url('img/back.png');
      background-size: auto;
      background-repeat: repeat;
      background-color: var(--black);
      border-bottom: 3px solid var(--red);
      padding: 12px 32px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-top-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-bottom-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      background: var(--black);
      color: var(--white);
      border: 2px solid var(--black);
      font-family: monospace;
      font-size: 16px;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { background: var(--red); border-color: var(--red); }

    .header-logo {
      height: 52px; width: auto;
      margin-left: 12px; padding: 6px 14px;
    }

    .nav-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 12px;
    }
    .header-sep { color: var(--black); font-size: 16px; font-weight: 900; }
    .header-section {
      font-family: monospace; font-size: 15px;
      font-weight: 900; letter-spacing: 3px; color: var(--black);
    }

    /* ── TIMER dentro de la nav ── */
    .global-timer {
      display: flex;
      align-items: stretch;
      border: 2px solid var(--black);
    }
    .timer-label-block {
      display: flex;
      align-items: center;
      padding: 6px 14px;
      border-right: 2px solid var(--black);
      background: var(--black);
    }
    .timer-label-block span {
      font-size: 9px; font-weight: 900;
      letter-spacing: 3px; color: var(--white);
      writing-mode: horizontal-tb;
    }
    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 16px;
    }
    .timer-block:not(:last-child) { border-right: 2px solid var(--black); }
    .timer-block .digits {
      font-size: 22px; font-weight: 900;
      letter-spacing: 4px; color: var(--red); line-height: 1;
    }
    .timer-block .label {
      font-size: 8px; letter-spacing: 2px; color: var(--black); margin-top: 2px;
    }

    /* ── GRID ── */
    .auction-grid {
      display: flex;
      flex-wrap: wrap;
      border-left: 3px solid var(--black);
      border-top: 3px solid var(--black);
    }

    .auction-card {
      width: 25%;
      border-right: 3px solid var(--black);
      border-bottom: 3px solid var(--black);
      display: flex; flex-direction: column;
      cursor: pointer;
      transition: background 0.2s;
      background: var(--white);
      position: relative;
    }
    .auction-card:hover { background: #f5f5f5; }
    .auction-card.active-card { background: var(--black); color: var(--white); }
    .auction-card.active-card .card-meta { color: #aaa; }
    .auction-card.active-card .card-footer { border-top-color: #333; }
    .auction-card.active-card .card-bids { color: #aaa; }

    .card-img {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover; display: block;
      border-bottom: 2px solid var(--black);
      filter: grayscale(15%);
      transition: filter 0.3s; background: #eee;
    }
    .auction-card:hover .card-img,
    .auction-card.active-card .card-img { filter: grayscale(0%); }

    .card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .card-title { font-size: 12px; font-weight: 900; letter-spacing: 1px; line-height: 1.4; text-transform: uppercase; }
    .card-meta { font-size: 10px; color: #666; letter-spacing: 0.5px; line-height: 1.5; }

    .card-footer {
      display: flex; justify-content: space-between; align-items: flex-end;
      padding: 10px 16px 14px;
      border-top: 1px solid #eee; margin-top: auto;
    }
    .card-price { font-size: 15px; font-weight: 900; color: var(--red); letter-spacing: 1px; }
    .card-bids { font-size: 10px; color: #888; letter-spacing: 1px; }

    .active-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--red); color: var(--white);
      font-size: 9px; font-weight: 900; letter-spacing: 2px; padding: 3px 8px;
    }

    /* ── DRAWER ── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; top: 0; right: 0; z-index: 400;
      width: 780px; max-width: 100vw; height: 100%;
      background: var(--white);
      border-left: 3px solid var(--black);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    .drawer.open { transform: translateX(0); }

    /* Header drawer */
    .drawer-header {
      background: var(--black);
      border-bottom: 3px solid var(--red);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .drawer-header-title {
      font-size: 11px; font-weight: 900; letter-spacing: 3px; color: var(--white);
    }
    .drawer-close {
      width: 34px; height: 34px;
      background: none; border: 2px solid #444;
      color: var(--white); font-family: monospace;
      font-size: 18px; font-weight: 900;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .drawer-close:hover { border-color: var(--red); background: var(--red); }

    /* Bloque libro — imagen más grande */
    .drawer-book {
      display: flex;
      flex-shrink: 0;
      border-bottom: 3px solid var(--black);
      height: 220px;
    }
    .drawer-book-img {
      width: 160px; flex-shrink: 0;
      border-right: 3px solid var(--black);
      overflow: hidden;
    }
    .drawer-book-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .drawer-book-info {
      flex: 1; padding: 20px 22px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .drawer-book-title {
      font-size: 15px; font-weight: 900;
      letter-spacing: 1px; line-height: 1.35;
      text-transform: uppercase;
    }
    .drawer-book-meta {
      font-size: 11px; color: #555; letter-spacing: 0.5px; line-height: 1.7;
    }
    .drawer-book-price-row {
      display: flex; align-items: baseline; gap: 12px; margin-top: auto;
      padding-top: 10px; border-top: 1px solid #eee;
    }
    .drawer-book-price-label {
      font-size: 9px; letter-spacing: 2px; color: #888; font-weight: 900;
    }
    .drawer-book-price {
      font-size: 26px; font-weight: 900; color: var(--red); letter-spacing: 1px;
    }
    .drawer-book-bids {
      font-size: 10px; color: #888; letter-spacing: 1px;
    }

    /* Cuerpo del drawer: dos columnas */
    .drawer-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Columna izquierda: formulario */
    .drawer-form-col {
      flex: 1;
      border-right: 3px solid var(--black);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .drawer-form-col-inner {
      padding: 22px 20px;
    }
    .drawer-form-col h3 {
      font-size: 10px; font-weight: 900; letter-spacing: 3px;
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 2px solid var(--red);
    }

    .bid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .bid-form label {
      display: flex; flex-direction: column; gap: 4px;
      font-size: 9px; letter-spacing: 2px; color: #666;
    }
    .bid-form label.full { grid-column: 1 / -1; }
    .bid-form input {
      background: var(--white); color: var(--black);
      border: 2px solid #ccc; font-family: monospace;
      font-size: 12px; letter-spacing: 1px; padding: 8px 10px;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    .bid-form input:focus { border-color: var(--red); }
    .bid-form input.monto-input {
      font-size: 20px; font-weight: 900;
      border-color: var(--black); letter-spacing: 2px;
    }
    .bid-form input.monto-input:focus { border-color: var(--red); }
    .bid-submit {
      grid-column: 1 / -1;
      background: var(--red); color: var(--white);
      border: 2px solid var(--red); font-family: monospace;
      font-size: 11px; font-weight: 900; letter-spacing: 3px;
      padding: 14px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s; margin-top: 6px;
    }
    .bid-submit:hover { background: var(--black); border-color: var(--black); }

    /* Columna derecha: historial */
    .drawer-history-col {
      width: 280px; flex-shrink: 0;
      display: flex; flex-direction: column;
      overflow-y: auto;
      background: #fafafa;
    }
    .drawer-history-col-inner {
      padding: 22px 18px;
    }
    .drawer-history-col h3 {
      font-size: 10px; font-weight: 900; letter-spacing: 3px;
      margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--black);
    }
    .bid-list { list-style: none; }
    .bid-list li {
      display: flex; flex-direction: column;
      padding: 10px 0; border-bottom: 1px solid #eee; gap: 3px;
    }
    .bid-list li .bid-row {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .bid-list li .bid-name { font-size: 11px; font-weight: 900; letter-spacing: 1px; }
    .bid-list li .bid-amount { font-size: 14px; font-weight: 900; color: var(--red); letter-spacing: 1px; white-space: nowrap; }
    .bid-list li .bid-time { font-size: 9px; color: #999; letter-spacing: 1px; }
    .bid-list li.top-bid .bid-name::before { content: "★ "; color: var(--red); }
    .no-bids { font-size: 11px; color: #aaa; font-style: italic; padding: 10px 0; letter-spacing: 1px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; left: 28px; z-index: 500;
      background: var(--black); color: var(--white);
      border-left: 4px solid var(--red); font-family: monospace;
      font-size: 12px; letter-spacing: 1.5px; padding: 14px 20px;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s; pointer-events: none; max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .drawer { width: 100vw; border-left: none; }
      .drawer-history-col { width: 220px; }
    }

    @media (max-width: 767px) {
      .auction-card { width: 50%; }
      .site-nav { padding: 10px 16px 12px; gap: 8px; }
      .header-logo { height: 40px; padding: 4px 10px; }
      .header-section { font-size: 13px; letter-spacing: 2px; }
      .timer-block { padding: 4px 10px; }
      .timer-block .digits { font-size: 18px; }
      .timer-label-block span { font-size: 8px; letter-spacing: 2px; }
      .timer-label-block { padding: 4px 10px; }

      /* En móvil: drawer en columna única */
      .drawer-body { flex-direction: column; }
      .drawer-form-col { border-right: none; border-bottom: 3px solid var(--black); overflow-y: visible; }
      .drawer-history-col { width: 100%; overflow-y: visible; }
      .bid-form { grid-template-columns: 1fr 1fr; }
      .drawer-book { height: 160px; }
      .drawer-book-img { width: 110px; }
    }

    @media (max-width: 479px) {
      .auction-card { width: 50%; }
      .card-body { padding: 8px 10px; }
      .card-title { font-size: 9px; }
      .card-meta { font-size: 8px; }
      .card-price { font-size: 12px; }
      .timer-block .digits { font-size: 15px; }
      .timer-block { padding: 3px 8px; }
      .bid-form { grid-template-columns: 1fr; }
      .bid-form label.full { grid-column: 1; }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-top-row">
      <a href="catalog.html" class="back-btn">←</a>
      <img src="svg/TUTIALOGO.svg" alt="TUTÍA" class="header-logo">
      <div class="nav-right">
        <span class="header-sep">/</span>
        <span class="header-section">SUBASTA</span>
      </div>
    </div>
    <div class="nav-bottom-row">
      <div class="global-timer">
        <div class="timer-label-block"><span>CIERRE DE SUBASTA</span></div>
        <div class="timer-block">
          <span class="digits" id="t-hours">00</span>
          <span class="label">HORAS</span>
        </div>
        <div class="timer-block">
          <span class="digits" id="t-minutes">00</span>
          <span class="label">MIN</span>
        </div>
        <div class="timer-block">
          <span class="digits" id="t-seconds">00</span>
          <span class="label">SEG</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-header-title">HACER UNA OFERTA</span>
      <button class="drawer-close" onclick="closeDrawer()">×</button>
    </div>

    <div class="drawer-book" id="drawer-book"></div>

    <div class="drawer-body">
      <!-- Columna formulario -->
      <div class="drawer-form-col">
        <div class="drawer-form-col-inner">
          <h3>TUS DATOS Y OFERTA</h3>
          <div class="bid-form" id="drawer-form">
            <label>NOMBRE<input type="text" name="nombre" autocomplete="off"></label>
            <label>APELLIDO<input type="text" name="apellido" autocomplete="off"></label>
            <label>DOCUMENTO<input type="text" name="documento" autocomplete="off"></label>
            <label>CELULAR<input type="text" name="celular" autocomplete="off"></label>
            <label class="full">CORREO ELECTRÓNICO<input type="email" name="mail" autocomplete="off"></label>
            <label class="full" id="monto-label">TU OFERTA<input type="number" name="monto" class="monto-input" autocomplete="off"></label>
            <button type="button" class="bid-submit" id="bid-submit-btn">ENVIAR OFERTA →</button>
          </div>
        </div>
      </div>

      <!-- Columna historial -->
      <div class="drawer-history-col">
        <div class="drawer-history-col-inner">
          <h3>OFERTAS ANTERIORES</h3>
          <ul class="bid-list" id="drawer-history"></ul>
        </div>
      </div>
    </div>
  </div>

  <div class="auction-grid" id="auction-grid"></div>
  <div class="toast" id="toast"></div>

  <script>
    const AUCTION_END = new Date(Date.now() + 47 * 3600 * 1000 + 23 * 60 * 1000 + 15 * 1000)

    const BOOKS = [
      {
        id: 1,
        title: "Nunca fuimos modernos",
        author: "Bruno Latour",
        publisher: "Siglo Veintiuno",
        pages: 221,
        category: "Antropología",
        image: "img/nuncafuimosmodernos-latour.jpg",
        basePrice: 400,
        bids: []
      },
      {
        id: 2,
        title: "Trabajar cansa / vendrá la muerte y tendrá tus ojos",
        author: "Cesar Pavese",
        publisher: "Gricelda García",
        pages: 171,
        category: "Poesía",
        image: "img/trabajarcansa-pavese.jpg",
        basePrice: 350,
        bids: []
      },
      {
        id: 3,
        title: "En las cumbres de la desesperación",
        author: "Emil Cioran",
        publisher: "Herminda",
        pages: 166,
        category: "Filosofía",
        image: null,
        basePrice: 380,
        bids: []
      },
      {
        id: 4,
        title: "Filosofías del sur — Descolonización y transmodernidad",
        author: "Enrique Dussel",
        publisher: "Akal",
        pages: 364,
        category: "Filosofía",
        image: "img/filosof-as-del-sur-descolonizaci-n-y-transmodernidad.jpg",
        basePrice: 500,
        bids: []
      }
    ]

    let activeBookId = null

    function currentPrice(book) {
      if (!book.bids.length) return book.basePrice
      return Math.max(...book.bids.map(b => b.amount))
    }

    function formatBidderName(nombre, apellido) {
      return `${nombre.trim().charAt(0).toUpperCase()}. ${apellido.trim().toUpperCase()}`
    }

    function renderGrid() {
      const grid = document.getElementById("auction-grid")
      grid.innerHTML = ""
      BOOKS.forEach(book => {
        const isActive = book.id === activeBookId
        const card = document.createElement("div")
        card.className = `auction-card${isActive ? " active-card" : ""}`
        const price = currentPrice(book)
        const bidsCount = book.bids.length
        const imgSrc = book.image || "https://placehold.co/300x400/111/fff?text=S/I"

        card.innerHTML = `
          ${isActive ? '<span class="active-badge">OFERTANDO</span>' : ""}
          <img class="card-img" src="${imgSrc}" alt="${book.title}"
               onerror="this.src='https://placehold.co/300x400/111/fff?text=S/I'">
          <div class="card-body">
            <div class="card-title">${book.title}</div>
            <div class="card-meta">${book.author}<br>${book.publisher} · ${book.category}</div>
          </div>
          <div class="card-footer">
            <div class="card-price">$ ${price.toLocaleString("es-UY")}</div>
            <div class="card-bids">${bidsCount} oferta${bidsCount !== 1 ? "s" : ""}</div>
          </div>`

        card.addEventListener("click", () => openDrawer(book.id))
        grid.appendChild(card)
      })
    }

    function openDrawer(bookId) {
      const book = BOOKS.find(b => b.id === bookId)
      if (!book) return
      activeBookId = bookId

      const price = currentPrice(book)
      const imgSrc = book.image || "https://placehold.co/300x400/111/fff?text=S/I"

      document.getElementById("drawer-book").innerHTML = `
        <div class="drawer-book-img">
          <img src="${imgSrc}" alt="${book.title}"
               onerror="this.src='https://placehold.co/300x400/111/fff?text=S/I'">
        </div>
        <div class="drawer-book-info">
          <div class="drawer-book-title">${book.title}</div>
          <div class="drawer-book-meta">${book.author}<br>${book.publisher} &nbsp;·&nbsp; ${book.category} &nbsp;·&nbsp; ${book.pages} págs.</div>
          <div class="drawer-book-price-row">
            <span class="drawer-book-price-label">OFERTA MÁS ALTA</span>
            <span class="drawer-book-price">$ ${price.toLocaleString("es-UY")}</span>
            <span class="drawer-book-bids">${book.bids.length} oferta${book.bids.length !== 1 ? "s" : ""}</span>
          </div>
        </div>`

      const montoLabel = document.getElementById("monto-label")
      montoLabel.childNodes[0].textContent = `TU OFERTA (MÍN. $ ${(price + 1).toLocaleString("es-UY")})`
      const montoInput = montoLabel.querySelector("input")
      montoInput.placeholder = `$ ${(price + 50).toLocaleString("es-UY")}`
      montoInput.min = price + 1

      document.getElementById("drawer-form").querySelectorAll("input").forEach(i => i.value = "")

      renderHistory(book)

      document.getElementById("bid-submit-btn").onclick = () => submitBid(book)

      document.getElementById("drawer").classList.add("open")
      document.getElementById("drawer-overlay").classList.add("open")
      document.body.style.overflow = "hidden"
      renderGrid()
    }

    function renderHistory(book) {
      const sorted = [...book.bids].sort((a, b) => b.amount - a.amount)
      const ul = document.getElementById("drawer-history")
      if (!sorted.length) {
        ul.innerHTML = `<li><span class="no-bids">Sin ofertas aún — ¡sé el primero!</span></li>`
        return
      }
      ul.innerHTML = sorted.map((b, i) => `
        <li class="${i === 0 ? "top-bid" : ""}">
          <div class="bid-row">
            <span class="bid-name">${b.name}</span>
            <span class="bid-amount">$ ${b.amount.toLocaleString("es-UY")}</span>
          </div>
          <span class="bid-time">${b.time}</span>
        </li>`).join("")
    }

    function closeDrawer() {
      activeBookId = null
      document.getElementById("drawer").classList.remove("open")
      document.getElementById("drawer-overlay").classList.remove("open")
      document.body.style.overflow = ""
      renderGrid()
    }

    function submitBid(book) {
      const form = document.getElementById("drawer-form")
      const nombre    = form.querySelector('[name="nombre"]').value.trim()
      const apellido  = form.querySelector('[name="apellido"]').value.trim()
      const documento = form.querySelector('[name="documento"]').value.trim()
      const celular   = form.querySelector('[name="celular"]').value.trim()
      const mail      = form.querySelector('[name="mail"]').value.trim()
      const montoRaw  = form.querySelector('[name="monto"]').value.trim()
      const monto     = parseInt(montoRaw, 10)
      const minimo    = currentPrice(book) + 1

      if (!nombre || !apellido || !documento || !celular || !mail || !montoRaw) {
        showToast("⚠ COMPLETÁ TODOS LOS CAMPOS"); return
      }
      if (isNaN(monto) || monto < minimo) {
        showToast(`⚠ LA OFERTA MÍNIMA ES $ ${minimo.toLocaleString("es-UY")}`); return
      }

      const now = new Date()
      const timeStr = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`
      book.bids.unshift({ name: formatBidderName(nombre, apellido), amount: monto, time: timeStr })

      showToast(`✓ OFERTA DE $ ${monto.toLocaleString("es-UY")} REGISTRADA`)

      const price = currentPrice(book)
      document.querySelector(".drawer-book-price").textContent = `$ ${price.toLocaleString("es-UY")}`
      document.querySelector(".drawer-book-bids").textContent = `${book.bids.length} oferta${book.bids.length !== 1 ? "s" : ""}`
      const montoLabel = document.getElementById("monto-label")
      montoLabel.childNodes[0].textContent = `TU OFERTA (MÍN. $ ${(price + 1).toLocaleString("es-UY")})`
      montoLabel.querySelector("input").min = price + 1
      form.querySelectorAll("input").forEach(i => i.value = "")
      renderHistory(book)
      renderGrid()
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer() })

    function updateTimer() {
      const diff = Math.max(0, AUCTION_END - Date.now())
      const h = Math.floor(diff / 3600000)
      const m = Math.floor((diff % 3600000) / 60000)
      const s = Math.floor((diff % 60000) / 1000)
      document.getElementById("t-hours").textContent   = String(h).padStart(2, "0")
      document.getElementById("t-minutes").textContent = String(m).padStart(2, "0")
      document.getElementById("t-seconds").textContent = String(s).padStart(2, "0")
    }
    setInterval(updateTimer, 1000)
    updateTimer()

    let toastTimer = null
    function showToast(msg) {
      const t = document.getElementById("toast")
      t.textContent = msg
      t.classList.add("show")
      if (toastTimer) clearTimeout(toastTimer)
      toastTimer = setTimeout(() => t.classList.remove("show"), 3200)
    }

    renderGrid()
  </script>
</body>
</html>
