<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TUTÍA — CLUB DE LIBROS</title>
  <link rel="stylesheet" href="css/catalog.css" />
  <style>
    :root {
      --red: #cc0000;
      --black: #000;
      --white: #fff;
    }

    /* ── NAV ── */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      border-bottom: 3px solid var(--red);
    }

    /* fila 1: logo + título alineado a la derecha */
    .nav-row-1 {
      display: flex;
      align-items: center;
      padding: 10px 24px;
      border-bottom: 1px solid #222;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--black);
      color: var(--white);
      border: 2px solid var(--white);
      font-family: monospace;
      font-size: 18px;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      margin-right: 20px;
    }
    .back-btn:hover { background: var(--red); border-color: var(--red); }

    .header-logo {
      height: 48px;       /* ← más grande */
      width: auto;
      filter: invert(1);
      margin-right: 28px; /* ← más separado */
    }

    /* empuja el título a la derecha */
    .nav-row-1-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-sep {
      font-family: monospace;
      font-size: 13px;
      font-weight: 900;
      color: var(--red);
    }

    .header-section {
      font-family: monospace;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--white);
    }

    /* fila 2: filtros */
    .nav-row-2 {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 10px 24px;
      flex-wrap: wrap;
    }

    .nav-row-2 input[type="text"],
    .nav-row-2 select {
      background: var(--black);
      color: var(--white);
      border: 2px solid #444;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      padding: 7px 12px;
      height: 38px;
      outline: none;
      transition: border-color 0.2s;
    }
    .nav-row-2 input[type="text"] {
      border-color: var(--red) !important;
      width: 160px !important;
      max-width: 160px !important;
      min-width: 0 !important;
      flex: none !important;
    }
    .nav-row-2 select {
      width: 140px; min-width: 140px; max-width: 140px;
      cursor: pointer; flex-shrink: 0;
    }
    .nav-row-2 input[type="text"]:focus,
    .nav-row-2 select:focus { border-color: var(--red); }
    .nav-row-2 input::placeholder { color: #666; font-family: monospace; font-size: 11px; }

    .button-dark {
      background: var(--red);
      color: var(--white);
      border: 2px solid var(--red);
      font-family: monospace;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2px;
      padding: 0 16px;
      height: 38px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }
    .button-dark:hover { background: var(--black); border-color: var(--white); }

    /* botón SUBASTA — estilo distinto para destacar */
    .button-subasta {
      background: transparent;
      color: var(--red);
      border: 2px solid var(--red);
      font-family: monospace;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2px;
      padding: 0 16px;
      height: 38px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
    }
    .button-subasta:hover { background: var(--red); color: var(--white); }

    .availability-switch {
      display: flex;
      border: 2px solid #444;
      overflow: hidden;
      height: 38px;
      flex-shrink: 0;
    }
    .switch-option {
      padding: 0 14px;
      font-family: monospace;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.5px;
      line-height: 34px;
      cursor: pointer;
      background: var(--black);
      color: var(--white);
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .switch-option:not(:last-child) { border-right: 2px solid #444; }
    .switch-option.active { background: var(--white); color: var(--black); }
    .switch-option:not(.active):hover { background: var(--red); color: var(--white); }

    /* ── CARD SELECTED ── */
    /* borde rojo cuando la card está seleccionada */
    .book.selected-card {
      border-color: var(--red);
    }
    /* pack-button siempre visible (corazón) */
    .pack-button {
      opacity: 1 !important;
      visibility: visible !important;
    }

    /* ── LAYOUT ── */
    .main-container {
      display: flex;
      min-height: calc(100vh - 111px);
    }

    /* ── CONTENIDO ── */
    .content {
      flex: 1;
      padding: 30px 24px;
      background: var(--white);
      overflow-y: auto;
    }
    #catalog {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: flex-start;
    }

    /* ── ASIDE DERECHO ── */
    .right-aside {
      position: sticky;
      top: 111px;
      width: 220px;
      min-width: 220px;
      height: calc(100vh - 111px);
      background: var(--black);
      color: var(--white);
      border-left: 3px solid var(--red);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      overflow-y: auto;
      flex-shrink: 0;
      order: 2;
    }
    .right-aside .logo {
      width: 90px;
      height: auto;
      filter: invert(1);
      margin-bottom: 20px;
    }
    .aside-bottom {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .selected-list {
      list-style: none;
      padding: 0;
      width: 100%;
    }
    .selected-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 0;
      border-bottom: 1px solid #333;
      color: var(--white);
    }
    .selected-list li.empty {
      color: #888;
      font-style: italic;
      border-bottom: none;
      justify-content: center;
      text-align: center;
      font-size: 10px;
      letter-spacing: 1px;
    }
    .selected-list li .remove-btn {
      width: 14px; height: 14px;
      filter: brightness(0) invert(1);
      cursor: pointer;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .finalize-selection-btn {
      width: 100%;
      padding: 12px;
      background: var(--red);
      color: var(--white);
      border: 2px solid var(--red);
      font-family: monospace;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s, border-color 0.2s;
    }
    .finalize-selection-btn:hover { background: var(--black); border-color: var(--white); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .right-aside { width: 180px; min-width: 180px; }
    }
    @media (max-width: 680px) {
      .main-container { flex-direction: column; }
      .right-aside {
        position: static;
        width: 100%;
        min-width: 0;
        height: auto;
        border-left: none;
        border-bottom: 3px solid var(--red);
        flex-direction: row;
        flex-wrap: wrap;
        padding: 12px 16px;
        order: -1;
      }
      .right-aside .logo { display: none; }
      .aside-bottom { flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px; }
      .selected-list { display: flex; flex-wrap: wrap; gap: 8px; }
      .selected-list li { border-bottom: none; padding: 4px 8px; border: 1px solid #333; }
      .nav-row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px 12px;
        justify-content: unset;
      }
      .nav-row-2 input[type="text"] {
        grid-column: 1 / -1;
        width: 100% !important;
        max-width: 100% !important;
      }
      .nav-row-2 select {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
      }
      .button-dark { width: 100%; }
      /* packs + subasta en la misma fila, mitad cada uno */
      .button-dark, .button-subasta { width: 100%; }
      .nav-row-2 .button-dark,
      .nav-row-2 .button-subasta { width: auto; flex: 1; }
      .nav-row-2 .buttons-row {
        grid-column: 1 / -1;
        display: flex;
        gap: 8px;
        width: 100%;
      }
      .availability-switch {
        grid-column: 1 / -1;
        width: 100%;
        justify-content: center;
      }
      .switch-option { flex: 1; text-align: center; }
      .header-logo { height: 34px; }
      .nav-row-1-right { gap: 6px; }
    }
    @media (max-width: 420px) {
      .nav-row-1 { padding: 8px 12px; }
      .header-logo { height: 28px; }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <!-- Fila 1: flecha + logo grande + título a la derecha -->
    <div class="nav-row-1">
      <a href="index.html" class="back-btn">←</a>
      <img src="svg/TUTIALOGO.svg" alt="TUTÍA" class="header-logo">

      <!-- título empujado a la derecha -->
      <div class="nav-row-1-right">
        <span class="header-sep">/</span>
        <span class="header-section">CLUB DE LIBROS</span>
      </div>
    </div>

    <!-- Fila 2: switch primero, luego filtros, luego packs -->
    <div class="nav-row-2">

      <!-- 1. TODOS / DISPONIBLES al principio -->
      <div class="availability-switch">
        <div class="switch-option active" id="all-books">TODOS</div>
        <div class="switch-option" id="available-books">DISPONIBLES</div>
      </div>

      <!-- 2. Filtros -->
      <input type="text" id="search" placeholder="TÍTULO O AUTOR" />

      <select id="editorial">
        <option value="all">EDITORIAL</option>
      </select>

      <select id="category">
        <option value="all">CATEGORÍA</option>
      </select>

      <!-- 3. Botones -->
      <div class="buttons-row">
        <button class="button-dark" onclick="window.location.href='packs.html'">
          VER PACKS
        </button>
        <button class="button-subasta" onclick="window.location.href='subasta.html'">
          SUBASTA
        </button>
      </div>

    </div>
  </nav>

  <div class="main-container">

    <main class="content">
      <div id="catalog"></div>
    </main>

    <aside class="right-aside">
      <a href="index.html">
        <img src="svg/TUTÍA_b.svg" alt="Logo" class="logo" />
      </a>
      <div class="aside-bottom">
        <ul class="selected-list"></ul>
      </div>
    </aside>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
