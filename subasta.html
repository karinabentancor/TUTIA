<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TUTÍA / SUBASTA</title>
  <style>
    :root {
      --red: #cc0000;
      --black: #000;
      --white: #fff;
      --gray: #ddd;
      --mid: #444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: monospace;
      background: var(--white);
      color: var(--black);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      border-bottom: 3px solid var(--red);
    }
    .nav-row-1 {
      display: flex;
      align-items: center;
      padding: 10px 24px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--black);
      color: var(--white);
      border: 2px solid var(--white);
      font-family: monospace;
      font-size: 18px;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      margin-right: 20px;
    }
    .back-btn:hover { background: var(--red); border-color: var(--red); }

    .header-logo {
      height: 48px;
      width: auto;
      filter: invert(1);
      margin-right: 28px;
    }
    .nav-row-1-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-sep { font-size: 13px; font-weight: 900; color: var(--red); }
    .header-section { font-size: 13px; font-weight: 900; letter-spacing: 3px; color: var(--white); }

    /* ── HERO ── */
    .auction-hero {
      background: var(--black);
      color: var(--white);
      padding: 32px 24px 28px;
      border-bottom: 3px solid var(--red);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .auction-hero h1 { font-size: 28px; letter-spacing: 6px; font-weight: 900; line-height: 1; }
    .auction-hero h1 span { color: var(--red); }
    .auction-hero p { font-size: 11px; letter-spacing: 2px; color: #888; margin-top: 8px; }

    .global-timer { display: flex; gap: 12px; align-items: flex-end; }
    .timer-block { display: flex; flex-direction: column; align-items: center; }
    .timer-block .digits {
      font-size: 32px; font-weight: 900; letter-spacing: 2px;
      color: var(--red); line-height: 1; min-width: 48px; text-align: center;
    }
    .timer-block .label { font-size: 9px; letter-spacing: 2px; color: #666; margin-top: 4px; }
    .timer-sep { font-size: 28px; font-weight: 900; color: var(--mid); line-height: 1.1; align-self: flex-start; margin-top: 2px; }

    /* ── GRID ── */
    .auction-grid {
      display: flex;
      flex-wrap: wrap;
      border-left: 3px solid var(--black);
      border-top: 3px solid var(--black);
    }

    /* ── CARD ── */
    .auction-card {
      width: calc(33.333%);
      border-right: 3px solid var(--black);
      border-bottom: 3px solid var(--black);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: background 0.2s;
      background: var(--white);
      position: relative;
    }
    .auction-card:hover { background: #fafafa; }
    .auction-card.active-card { background: var(--black); color: var(--white); }
    .auction-card.active-card .card-meta { color: #aaa; }
    .auction-card.active-card .card-footer { border-top-color: #333; }

    .card-img {
      width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
      border-bottom: 2px solid var(--black); filter: grayscale(20%);
      transition: filter 0.3s; background: #eee;
    }
    .auction-card:hover .card-img,
    .auction-card.active-card .card-img { filter: grayscale(0%); }

    .card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .card-title { font-size: 12px; font-weight: 900; letter-spacing: 1px; line-height: 1.4; }
    .card-meta { font-size: 10px; color: #666; letter-spacing: 0.5px; line-height: 1.5; }

    .card-footer {
      display: flex; justify-content: space-between; align-items: flex-end;
      padding: 10px 16px 14px; border-top: 1px solid #eee; margin-top: auto;
    }
    .card-price { font-size: 15px; font-weight: 900; color: var(--red); letter-spacing: 1px; }
    .card-bids { font-size: 10px; color: #888; letter-spacing: 1px; }

    .active-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--red); color: var(--white);
      font-size: 9px; font-weight: 900; letter-spacing: 2px; padding: 3px 8px;
    }

    /* ── PANEL ── */
    .bid-panel-wrapper {
      width: 100%;
      border-right: 3px solid var(--black);
      border-bottom: 3px solid var(--black);
      display: none;
      flex-basis: 100%;
    }
    .bid-panel-wrapper.open { display: flex; }
    .bid-panel { display: flex; width: 100%; }

    .bid-form-section { flex: 1; padding: 28px; border-right: 2px solid var(--gray); }
    .bid-form-section h3 {
      font-size: 13px; font-weight: 900; letter-spacing: 3px;
      margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--red); line-height: 1.4;
    }

    .bid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .bid-form label {
      display: flex; flex-direction: column; gap: 5px;
      font-size: 9px; letter-spacing: 2px; color: #666;
    }
    .bid-form label.full { grid-column: 1 / -1; }
    .bid-form input {
      background: var(--white); color: var(--black);
      border: 2px solid #ccc; font-family: monospace;
      font-size: 12px; letter-spacing: 1px; padding: 9px 12px;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    .bid-form input:focus { border-color: var(--red); }
    .bid-form input.monto-input { font-size: 18px; font-weight: 900; border-color: var(--black); }
    .bid-form input.monto-input:focus { border-color: var(--red); }

    .bid-submit {
      grid-column: 1 / -1;
      background: var(--red); color: var(--white);
      border: 2px solid var(--red); font-family: monospace;
      font-size: 11px; font-weight: 900; letter-spacing: 2px;
      padding: 13px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s; margin-top: 4px;
    }
    .bid-submit:hover { background: var(--black); border-color: var(--white); }

    .bid-history-section { width: 300px; min-width: 260px; padding: 28px 24px; background: #fafafa; }
    .bid-history-section h3 {
      font-size: 13px; font-weight: 900; letter-spacing: 3px;
      margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--black);
    }
    .bid-list { list-style: none; }
    .bid-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #e0e0e0; gap: 10px;
    }
    .bid-list li .bid-name { font-size: 11px; font-weight: 900; letter-spacing: 1px; flex: 1; }
    .bid-list li .bid-amount { font-size: 13px; font-weight: 900; color: var(--red); letter-spacing: 1px; white-space: nowrap; }
    .bid-list li .bid-time { font-size: 9px; color: #999; letter-spacing: 1px; white-space: nowrap; }
    .bid-list li.top-bid .bid-name::before { content: "★ "; color: var(--red); }
    .no-bids { font-size: 11px; color: #aaa; font-style: italic; padding: 10px 0; letter-spacing: 1px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--black); color: var(--white);
      border-left: 4px solid var(--red); font-family: monospace;
      font-size: 12px; letter-spacing: 1.5px; padding: 14px 20px;
      z-index: 999; opacity: 0; transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s; pointer-events: none; max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) { .auction-card { width: 50%; } }
    @media (max-width: 680px) {
      .auction-card { width: 100%; }
      .bid-panel { flex-direction: column; }
      .bid-form-section { border-right: none; padding: 20px 16px; }
      .bid-history-section { width: 100%; min-width: 0; border-top: 2px solid var(--gray); padding: 20px 16px; }
      .auction-hero h1 { font-size: 22px; }
      .timer-block .digits { font-size: 24px; }
      .header-logo { height: 34px; }
    }
    @media (max-width: 420px) {
      .bid-form { grid-template-columns: 1fr; }
      .bid-form label.full { grid-column: 1; }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-row-1">
      <a href="catalog.html" class="back-btn">←</a>
      <img src="svg/TUTIALOGO.svg" alt="TUTÍA" class="header-logo">
      <div class="nav-row-1-right">
        <span class="header-sep">/</span>
        <span class="header-section">SUBASTA</span>
      </div>
    </div>
  </nav>

  <div class="auction-hero">
    <div>
      <h1>SUB<span>ASTA</span></h1>
      <p>HACÉ TU OFERTA · GANA EL MÁS ALTO POSTOR</p>
    </div>
    <div class="global-timer">
      <div class="timer-block">
        <span class="digits" id="t-hours">00</span>
        <span class="label">HORAS</span>
      </div>
      <span class="timer-sep">:</span>
      <div class="timer-block">
        <span class="digits" id="t-minutes">00</span>
        <span class="label">MIN</span>
      </div>
      <span class="timer-sep">:</span>
      <div class="timer-block">
        <span class="digits" id="t-seconds">00</span>
        <span class="label">SEG</span>
      </div>
    </div>
  </div>

  <div class="auction-grid" id="auction-grid"></div>
  <div class="toast" id="toast"></div>

  <script>
    const AUCTION_END = new Date(Date.now() + 47 * 3600 * 1000 + 23 * 60 * 1000 + 15 * 1000)

    const BOOKS = [
      {
        id: 1,
        title: "Nunca fuimos modernos",
        author: "Bruno Latour",
        publisher: "Siglo Veintiuno",
        pages: 221,
        category: "Antropología",
        image: "img/nuncafuimosmodernos-latour.jpg",
        basePrice: 400,
        bids: []
      },
      {
        id: 2,
        title: "Trabajar cansa / vendrá la muerte y tendrá tus ojos",
        author: "Cesar Pavese",
        publisher: "Gricelda García",
        pages: 171,
        category: "Poesía",
        image: "img/trabajarcansa-pavese.jpg",
        basePrice: 350,
        bids: []
      },
      {
        id: 3,
        title: "En las cumbres de la desesperación",
        author: "Emil Cioran",
        publisher: "Herminda",
        pages: 166,
        category: "Filosofía",
        image: null,
        basePrice: 380,
        bids: []
      },
      {
        id: 4,
        title: "Filosofías del sur — Descolonización y transmodernidad",
        author: "Enrique Dussel",
        publisher: "Akal",
        pages: 364,
        category: "Filosofía",
        image: "img/filosof-as-del-sur-descolonizaci-n-y-transmodernidad.jpg",
        basePrice: 500,
        bids: []
      },
      {
        id: 5,
        title: "La mirada del jaguar — Introducción al perspectivismo amerindio",
        author: "Eduardo Viveiros de Castro",
        publisher: "Tinta Limón",
        pages: 288,
        category: "Antropología",
        image: "img/la-mirada-del-jaguar-introducci-n-al-pespectivismo-amerindio.jpg",
        basePrice: 450,
        bids: []
      },
      {
        id: 6,
        title: "Gramática de la multitud",
        author: "Paolo Virno",
        publisher: "Tinta Limón / Traficantes de sueños",
        pages: 137,
        category: "Filosofía",
        image: "img/gram-tica-de-la-multitud-para-un-an-lisis-de-las-formas-de-vida-contempor-neas.jpg",
        basePrice: 320,
        bids: []
      }
    ]

    let activeCardId = null

    function currentPrice(book) {
      if (!book.bids.length) return book.basePrice
      return Math.max(...book.bids.map(b => b.amount))
    }

    /* "Karina" + "Bentancor" → "K. BENTANCOR" */
    function formatBidderName(nombre, apellido) {
      const inicial = nombre.trim().charAt(0).toUpperCase()
      const ap = apellido.trim().toUpperCase()
      return `${inicial}. ${ap}`
    }

    function renderGrid() {
      const grid = document.getElementById("auction-grid")
      grid.innerHTML = ""
      const ROW_SIZE = 3

      for (let i = 0; i < BOOKS.length; i += ROW_SIZE) {
        const row = BOOKS.slice(i, i + ROW_SIZE)

        row.forEach(book => {
          const isActive = book.id === activeCardId
          const card = document.createElement("div")
          card.className = `auction-card${isActive ? " active-card" : ""}`
          card.dataset.id = book.id

          const price = currentPrice(book)
          const bidsCount = book.bids.length
          const imgSrc = book.image || "https://placehold.co/300x400/111/fff?text=S/I"

          card.innerHTML = `
            ${isActive ? '<span class="active-badge">OFERTANDO</span>' : ""}
            <img class="card-img" src="${imgSrc}" alt="${book.title}"
                 onerror="this.src='https://placehold.co/300x400/111/fff?text=S/I'">
            <div class="card-body">
              <div class="card-title">${book.title}</div>
              <div class="card-meta">${book.author}<br>${book.publisher} · ${book.category}</div>
            </div>
            <div class="card-footer">
              <div class="card-price">$ ${price.toLocaleString("es-UY")}</div>
              <div class="card-bids">${bidsCount} oferta${bidsCount !== 1 ? "s" : ""}</div>
            </div>
          `

          card.addEventListener("click", () => togglePanel(book.id))
          grid.appendChild(card)
        })

        /* panel de la fila */
        const panel = document.createElement("div")
        panel.className = "bid-panel-wrapper"

        const activeInRow = row.find(b => b.id === activeCardId)
        if (activeInRow) {
          panel.classList.add("open")
          panel.innerHTML = buildPanel(activeInRow)
          bindForm(panel, activeInRow)
        }

        grid.appendChild(panel)
      }
    }

    function buildPanel(book) {
      const price = currentPrice(book)
      const sortedBids = [...book.bids].sort((a, b) => b.amount - a.amount)

      const historyHTML = sortedBids.length
        ? sortedBids.map((b, i) => `
            <li class="${i === 0 ? "top-bid" : ""}">
              <span class="bid-name">${b.name}</span>
              <span class="bid-amount">$ ${b.amount.toLocaleString("es-UY")}</span>
              <span class="bid-time">${b.time}</span>
            </li>`).join("")
        : `<li><span class="no-bids">Sin ofertas aún — ¡sé el primero!</span></li>`

      return `
        <div class="bid-panel">
          <div class="bid-form-section">
            <h3>HACER UNA OFERTA — ${book.title}</h3>
            <div class="bid-form" id="form-${book.id}">
              <label>
                NOMBRE
                <input type="text" name="nombre" placeholder="Karina" required autocomplete="off">
              </label>
              <label>
                APELLIDO
                <input type="text" name="apellido" placeholder="Bentancor" required autocomplete="off">
              </label>
              <label>
                DOCUMENTO DE IDENTIDAD
                <input type="text" name="documento" placeholder="CI / Pasaporte" required autocomplete="off">
              </label>
              <label>
                CELULAR
                <input type="text" name="celular" placeholder="+598 09X XXX XXX" required autocomplete="off">
              </label>
              <label class="full">
                CORREO ELECTRÓNICO
                <input type="email" name="mail" placeholder="tu@mail.com" required autocomplete="off">
              </label>
              <label class="full">
                TU OFERTA (mínimo $ ${(price + 1).toLocaleString("es-UY")})
                <input type="number" name="monto" class="monto-input"
                       placeholder="$ ${(price + 50).toLocaleString("es-UY")}"
                       min="${price + 1}" required autocomplete="off">
              </label>
              <button type="button" class="bid-submit" data-book-id="${book.id}">ENVIAR OFERTA</button>
            </div>
          </div>
          <div class="bid-history-section">
            <h3>OFERTAS ANTERIORES</h3>
            <ul class="bid-list" id="history-${book.id}">
              ${historyHTML}
            </ul>
          </div>
        </div>
      `
    }

    function bindForm(panel, book) {
      const btn = panel.querySelector(".bid-submit")
      if (!btn) return
      btn.addEventListener("click", () => submitBid(book))
    }

    function togglePanel(bookId) {
      activeCardId = activeCardId === bookId ? null : bookId
      renderGrid()
      if (activeCardId) {
        setTimeout(() => {
          const openPanel = document.querySelector(".bid-panel-wrapper.open")
          if (openPanel) openPanel.scrollIntoView({ behavior: "smooth", block: "nearest" })
        }, 60)
      }
    }

    function submitBid(book) {
      const form = document.getElementById(`form-${book.id}`)
      if (!form) return

      const nombre    = form.querySelector('[name="nombre"]').value.trim()
      const apellido  = form.querySelector('[name="apellido"]').value.trim()
      const documento = form.querySelector('[name="documento"]').value.trim()
      const celular   = form.querySelector('[name="celular"]').value.trim()
      const mail      = form.querySelector('[name="mail"]').value.trim()
      const montoRaw  = form.querySelector('[name="monto"]').value.trim()
      const monto     = parseInt(montoRaw, 10)
      const minimo    = currentPrice(book) + 1

      if (!nombre || !apellido || !documento || !celular || !mail || !montoRaw) {
        showToast("⚠ COMPLETÁ TODOS LOS CAMPOS")
        return
      }
      if (isNaN(monto) || monto < minimo) {
        showToast(`⚠ LA OFERTA MÍNIMA ES $ ${minimo.toLocaleString("es-UY")}`)
        return
      }

      const now = new Date()
      const timeStr = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`

      book.bids.unshift({
        name: formatBidderName(nombre, apellido),
        amount: monto,
        time: timeStr
      })

      showToast(`✓ OFERTA DE $ ${monto.toLocaleString("es-UY")} REGISTRADA`)

      setTimeout(() => {
        renderGrid()
        const openPanel = document.querySelector(".bid-panel-wrapper.open")
        if (openPanel) openPanel.scrollIntoView({ behavior: "smooth", block: "nearest" })
      }, 50)
    }

    /* countdown */
    function updateTimer() {
      const diff = Math.max(0, AUCTION_END - Date.now())
      const h = Math.floor(diff / 3600000)
      const m = Math.floor((diff % 3600000) / 60000)
      const s = Math.floor((diff % 60000) / 1000)
      document.getElementById("t-hours").textContent   = String(h).padStart(2, "0")
      document.getElementById("t-minutes").textContent = String(m).padStart(2, "0")
      document.getElementById("t-seconds").textContent = String(s).padStart(2, "0")
    }
    setInterval(updateTimer, 1000)
    updateTimer()

    /* toast */
    let toastTimer = null
    function showToast(msg) {
      const t = document.getElementById("toast")
      t.textContent = msg
      t.classList.add("show")
      if (toastTimer) clearTimeout(toastTimer)
      toastTimer = setTimeout(() => t.classList.remove("show"), 3200)
    }

    renderGrid()
  </script>
</body>
</html>
