<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TUTÍA / PACKS </title>
  <link rel="stylesheet" href="css/packs.css" />
  <style>
    :root {
      --red: #cc0000;
      --black: #000;
      --white: #fff;
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,43,43,1);
      border-bottom: 3px solid var(--black);
    }
    .nav-row-1 {
      display: flex;
      align-items: center;
      padding: 10px 24px;
      gap: 0;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: transparent;
      color: var(--black);
      border: 2px solid var(--black);
      font-family: monospace;
      font-size: 18px;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      margin-right: 28px;
    }
    .back-btn:hover { background: var(--black); color: rgba(255,43,43,1); border-color: var(--black); }

    .header-logo {
      height: 52px;
      width: auto;
      filter: brightness(0);
      margin-right: 32px;
    }
    .nav-row-1-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-sep { font-family: monospace; font-size: 13px; font-weight: 900; color: var(--black); }
    .header-section { font-family: monospace; font-size: 13px; font-weight: 900; letter-spacing: 3px; color: var(--black); }

    .content { padding-top: 16px; }
    .pack-section { margin-top: 0; padding-top: 0; }

    @media (max-width: 680px) {
      .header-logo { height: 38px; }
    }
    @media (max-width: 420px) {
      .nav-row-1 { padding: 8px 12px; }
      .header-logo { height: 30px; }
      .back-btn { margin-right: 16px; }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-row-1">
      <a href="catalog.html" class="back-btn">←</a>
    <div class="nav-row-1-right">
        <span class="header-sep">/</span>
        <span class="header-section">PACKS DE LIBROS</span>
      </div>
    </div>
  </nav>

  <main class="content">
    <div class="packs-sections">
      <section class="pack-section">
        <div class="carousel" id="packs-2"></div>
      </section>

      <div class="roulette-section">
        <div class="roulette-container">
          <div class="roulette-intro">
            <h2 class="roulette-title">¿NO SABÉS CUÁL ELEGIR?</h2>
            <h3 class="roulette-subtitle">GIRÁ LA RULETA</h3>
          </div>

          <button id="spin" class="button-dark spin-button">GIRAR RULETA</button>

          <div id="result" class="roulette-result"></div>

          <div id="actions" class="roulette-actions">
            <button id="select" class="button">SELECCIONAR ESTE PACK</button>
            <button id="retry" class="button">VOLVER A GIRAR</button>
          </div>
        </div>
      </div>

      <footer class="page-footer">
        <a href="index.html">
          <img src="svg/TUTIALOGO.svg" alt="Logo TUTÍA" class="logo" />
        </a>
        <p class="footer-location"><strong>Montevideo, Uruguay</strong></p>
      </footer>
    </div>
  </main>

  <script src="js/packs.js"></script>
</body>
</html>
