<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUTÍA / EVENTOS</title>
<meta name="description" content="TUTÍA — ESTUDIO CREATIVO Montevideo, Uruguay.">
<meta property="og:title" content="TUTÍA / EVENTOS">
<meta property="og:description" content="ESTUDIO CREATIVO Montevideo, Uruguay.">
<meta property="og:image" content="https://tutía.uy/img/back.png">
<link rel="icon" type="image/png" href="img/favicon.png">
<style>
  :root { --red: #cc0000; --black: #000; --white: #fff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; max-width: 100%; }
  body { font-family: monospace; font-size: 16px; background: var(--white) url('img/back.png') center center / cover fixed; color: var(--black); }

  .eventos-header {
    position: sticky; top: 0; z-index: 100;
    background-color: transparent;
    border-bottom: none;
    padding: 12px 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .back-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    background: var(--black); color: var(--white);
    border: 2px solid var(--black);
    font-family: monospace; font-size: 16px;
    text-decoration: none; flex-shrink: 0;
  }

  .floating-tab {
    position: fixed; right: 0;
    writing-mode: vertical-rl; text-orientation: mixed;
    transform: rotate(180deg);
    color: var(--white);
    text-decoration: none; font-family: monospace;
    font-size: 13px; font-weight: 900; letter-spacing: 0.2em;
    padding: 13px; z-index: 999;
    height: 140px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--white); border-right: none;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .floating-tab.estudio { top: calc(50% - 150px); background: var(--black); border-color: var(--black); }
  .floating-tab.estudio:hover { background: var(--red); border-color: var(--red); }
  .floating-tab.proyectos { top: calc(50% + 10px); background: var(--red); border-color: var(--red); }
  .floating-tab.proyectos:hover { background: #aa0000; border-color: #aa0000; }

  .page { max-width: 1100px; margin: 0 auto; padding: 72px 32px 120px; }

  .hero {
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 3px solid var(--black);
    padding-bottom: 24px; margin-bottom: 56px; gap: 32px;
  }
  .hero-tag { font-size: 11px; letter-spacing: 4px; font-weight: 900; color: var(--black); margin-bottom: 18px; }
  .hero-title {
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 900; letter-spacing: -2px;
    line-height: 0.88; text-transform: uppercase;
    color: var(--black);
  }
  .hero-right {
    flex-shrink: 0;
    font-size: 11px; letter-spacing: 1.5px; line-height: 1.6;
    color: var(--black); text-align: right;
    white-space: nowrap; font-weight: 900;
  }

  .events-list { display: flex; flex-direction: column; gap: 0; }

  .event-card {
    cursor: pointer;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-left: 3px solid transparent;
    margin-bottom: 16px;
    transition: border-color 0.2s, background 0.2s;
  }
  .event-card:hover { background: rgba(255,255,255,0.97); border-left-color: var(--red); }

  .event-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    align-items: center;
    gap: 0 40px;
    padding: 32px 28px 24px;
  }

  .row-date { display: flex; flex-direction: column; gap: 2px; }
  .row-day { font-size: 40px; font-weight: 900; line-height: 1; color: var(--red); }
  .row-month { font-size: 12px; letter-spacing: 3px; font-weight: 900; color: var(--black); }
  .row-time { display: none; }

  .row-cat { font-size: 11px; letter-spacing: 3px; font-weight: 900; color: var(--black); margin-bottom: 8px; }
  .row-title {
    font-size: 26px; font-weight: 900; letter-spacing: 1px;
    text-transform: uppercase; color: var(--black);
    margin-bottom: 6px; line-height: 1.2;
  }
  .row-venue { font-size: 13px; letter-spacing: 1.5px; color: var(--black); margin-bottom: 10px; }
  .row-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .row-tag { font-size: 11px; letter-spacing: 1.5px; font-weight: 900; color: var(--black); }
  .row-tag:not(:last-child)::after { content: '·'; margin-left: 8px; }

  .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; flex-shrink: 0; }
  .row-arrow { font-size: 26px; transform: translateX(4px); color: var(--black); }

  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: rgba(255,255,255,0.95);
    border-left: 4px solid var(--red);
    max-width: 660px; width: 100%;
    max-height: 90vh; overflow-y: auto; font-family: monospace;
  }
  .modal-header {
    background: transparent;
    padding: 24px 36px 0;
    display: flex; align-items: flex-start; justify-content: space-between;
    position: sticky; top: 0; z-index: 2;
  }
  .modal-header-left { font-size: 11px; letter-spacing: 4px; font-weight: 900; color: var(--red); }
  .modal-close {
    background: none; border: 2px solid var(--black); color: var(--black);
    font-family: monospace; font-size: 18px; font-weight: 900;
    width: 36px; height: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  .modal-body { padding: 20px 36px 48px; }
  .modal-cat { display: none; }
  .modal-title {
    font-size: clamp(36px, 6vw, 56px); font-weight: 900;
    letter-spacing: -1px; text-transform: uppercase;
    color: var(--black); margin-bottom: 16px; line-height: 0.92;
  }
  .modal-venue { font-size: 14px; letter-spacing: 2px; color: var(--red); margin-bottom: 4px; font-weight: 700; }
  .modal-datetime { font-size: 13px; letter-spacing: 2px; color: var(--black); margin-bottom: 36px; }
  .modal-desc {
    font-size: 15px; letter-spacing: 0.3px; line-height: 1.9;
    color: var(--black); border-left: none;
    padding-left: 0; margin-bottom: 36px;
  }
  .modal-tags { display: flex; gap: 10px; flex-wrap: wrap; }
  .modal-tag {
    font-size: 11px; letter-spacing: 2px; font-weight: 900;
    border: 2px solid var(--black); padding: 6px 14px; color: var(--black);
  }

  @media (max-width: 640px) {
    .page { padding: 40px 56px 100px 20px; }
    .eventos-header { padding: 10px 16px; gap: 10px; }
    .hero { flex-direction: column; gap: 14px; align-items: flex-start; }
    .hero-right { text-align: left; margin-top: 24px; white-space: normal; }
    .event-card { margin-bottom: 16px; }
    .event-row { grid-template-columns: 70px 1fr auto; gap: 0 20px; padding: 24px 20px 16px; }
    .row-day { font-size: 28px; }
    .row-title { font-size: 16px; }
    .row-tags { display: none; }
    .row-tags-below {
      display: flex; gap: 5px; flex-wrap: wrap;
      padding: 0 20px 20px;
    }
    .row-tag-below {
      font-size: 9px; letter-spacing: 1px; font-weight: 900;
      color: var(--black);
    }
    .row-tag-below:not(:last-child)::after { content: '·'; margin-left: 5px; }
    .floating-tab { font-size: 10px; padding: 8px; height: 110px; }
    .modal-body { padding: 24px 20px 28px; }
    .modal-title { font-size: 22px; }
  }
  @media (min-width: 641px) {
    .row-tags-below { display: none; }
  }
</style>
</head>
<body>

<header class="eventos-header">
  <a href="index.html" class="back-btn">←</a>
</header>

<div class="modal-overlay" id="event-modal" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-left" id="modal-header-label"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-venue" id="modal-venue"></div>
      <div class="modal-datetime" id="modal-datetime"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
  </div>
</div>

<div class="page">
  <div class="hero">
    <div>
      <div class="hero-tag">TUTÍA — ESTUDIO CREATIVO</div>
      <div class="hero-title">EVENTOS</div>
    </div>
    <div class="hero-right">
      Fechas que no se repiten.<br>Momentos que solo existen si estás.
    </div>
  </div>

  <div class="events-list" id="events-list"></div>
</div>

<a href="estudio.html" class="floating-tab estudio">ESTUDIO</a>
<a href="projects.html" class="floating-tab proyectos">PROYECTOS</a>

<script>
const EVENTS = [
  {
    title: 'INAUGURACIÓN',
    cat: 'OPENING',
    day: '12', month: 'MAY', year: '2025', time: '14:00 — 21:00 HS',
    venue: 'ESTUDIO TUTÍA',
    statusLabel: 'PRÓXIMO',
    desc: 'Nos encontramos a celebrar este nuevo espacio. Una tarde para conocerse, para ver, para escuchar.  Habrá brindis, shooting de fotos, exhibiciones de artistas y música. La entrada libre con capacidad limitada.',
    tags: ['COCKTAIL', 'EXHIBITIONS', 'PHOTO SHOOTING', 'MUSIC', 'VISUAL PROJECTIONS', 'GIFTS'],
  },
]

function buildList() {
  const list = document.getElementById('events-list')
  EVENTS.forEach(ev => {
    const card = document.createElement('div')
    card.className = 'event-card'
    card.innerHTML = `
      <div class="event-row">
        <div class="row-date">
          <div class="row-day">${ev.day}</div>
          <div class="row-month">${ev.month} ${ev.year}</div>
        </div>
        <div class="row-body">
          <div class="row-cat">${ev.cat}</div>
          <div class="row-title">${ev.title}</div>
          <div class="row-venue">${ev.venue}</div>
          <div class="row-tags">${ev.tags.map(t => `<span class="row-tag">${t}</span>`).join('')}</div>
        </div>
        <div class="row-right">
          <div class="row-arrow">→</div>
        </div>
      </div>
      <div class="row-tags-below">${ev.tags.map(t => `<span class="row-tag-below">${t}</span>`).join('')}</div>
    `
    card.onclick = () => openModal(ev)
    list.appendChild(card)
  })
}

function openModal(ev) {
  document.getElementById('modal-header-label').textContent = ev.cat
  document.getElementById('modal-cat').textContent = ev.cat
  document.getElementById('modal-title').textContent = ev.title
  document.getElementById('modal-venue').textContent = ev.venue
  document.getElementById('modal-datetime').textContent = ev.day + ' ' + ev.month + ' ' + ev.year + ' — ' + ev.time
  document.getElementById('modal-desc').textContent = ev.desc
  document.getElementById('modal-tags').innerHTML = ev.tags.map(t => `<span class="modal-tag">${t}</span>`).join('')
  document.getElementById('event-modal').classList.add('open')
  document.body.style.overflow = 'hidden'
}

function closeModal() {
  document.getElementById('event-modal').classList.remove('open')
  document.body.style.overflow = ''
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('event-modal')) closeModal()
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })

buildList()
</script>
</body>
</html>
