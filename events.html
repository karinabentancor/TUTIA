<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUTÍA / EVENTOS</title>
<style>
  :root { --red: #cc0000; --black: #000; --white: #fff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; max-width: 100%; }
  body { font-family: monospace; font-size: 16px; background: var(--white); color: var(--black); }

  .eventos-header {
    position: sticky; top: 0; z-index: 100;
    background-color: var(--black);
    border-bottom: 3px solid var(--red);
    padding: 12px 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .back-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    background: var(--red); color: var(--white);
    border: 2px solid var(--red);
    font-family: monospace; font-size: 16px;
    text-decoration: none; flex-shrink: 0;
  }
  .header-logo { height: 52px; width: auto; margin-left: 12px; padding: 6px 14px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .header-section { font-family: monospace; font-size: 15px; font-weight: 900; letter-spacing: 3px; color: var(--black); }

  .floating-tab {
    position: fixed; right: 0;
    writing-mode: vertical-rl; text-orientation: mixed;
    transform: rotate(180deg);
    color: var(--white);
    text-decoration: none; font-family: monospace;
    font-size: 11px; font-weight: 900; letter-spacing: 0.2em;
    padding: 18px 10px; z-index: 999;
    border: 2px solid var(--white); border-right: none;
    white-space: nowrap;
  }
  .floating-tab.estudio { top: calc(50% - 90px); background: var(--black); border-color: var(--white); }
  .floating-tab.proyectos { top: calc(50% + 10px); background: var(--red); border-color: var(--red); }

  .page { max-width: 1100px; margin: 0 auto; padding: 72px 32px 120px; }

  .hero {
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 3px solid var(--black);
    padding-bottom: 40px; margin-bottom: 56px; gap: 32px;
  }
  .hero-tag { font-size: 11px; letter-spacing: 4px; font-weight: 900; color: #999; margin-bottom: 18px; }
  .hero-title {
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 900; letter-spacing: -2px;
    line-height: 0.88; text-transform: uppercase;
    color: var(--red);
  }
  .hero-right {
    flex-shrink: 0; max-width: 260px;
    font-size: 11px; letter-spacing: 1.5px; line-height: 2.2;
    color: #888; text-align: right;
  }

  .events-list { display: flex; flex-direction: column; }

  .event-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    align-items: center;
    gap: 0 40px;
    padding: 36px 0;
    border-bottom: 1px solid #e8e8e8;
    cursor: pointer;
    position: relative;
    background: #f8f8f8;
  }
  .event-row::before {
    content: '';
    position: absolute;
    left: -32px; right: -32px; top: 0; bottom: 0;
    background: #f8f8f8;
    z-index: -1;
  }
  .event-row .row-arrow { color: var(--red); }
  .event-row .row-day { color: var(--red); }

  .row-date { display: flex; flex-direction: column; gap: 2px; }
  .row-day { font-size: 40px; font-weight: 900; line-height: 1; }
  .row-month { font-size: 10px; letter-spacing: 3px; font-weight: 900; color: #bbb; }
  .row-time { font-size: 10px; letter-spacing: 2px; color: #ccc; }

  .row-body {}
  .row-cat { font-size: 9px; letter-spacing: 3px; font-weight: 900; color: #bbb; margin-bottom: 8px; }
  .row-title {
    font-size: 22px; font-weight: 900; letter-spacing: 1px;
    text-transform: uppercase; color: var(--black);
    margin-bottom: 6px; line-height: 1.2;
  }
  .row-venue { font-size: 10px; letter-spacing: 1.5px; color: #999; margin-bottom: 10px; }
  .row-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .row-tag { font-size: 9px; letter-spacing: 1.5px; font-weight: 900; color: #bbb; }
  .row-tag:not(:last-child)::after { content: '·'; margin-left: 8px; }

  .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; flex-shrink: 0; }
  .row-status {
    font-size: 9px; letter-spacing: 2px; font-weight: 900;
    padding: 4px 12px; border: 1px solid var(--red); color: var(--red);
  }
  .row-arrow { font-size: 18px; transform: translateX(4px); }

  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.92);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--white); border: 3px solid var(--black);
    max-width: 620px; width: 100%;
    max-height: 90vh; overflow-y: auto; font-family: monospace;
  }
  .modal-header {
    background: var(--black); color: var(--white);
    padding: 14px 22px; font-size: 10px; letter-spacing: 3px; font-weight: 900;
    border-bottom: 3px solid var(--red);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 2;
  }
  .modal-header-left { display: flex; align-items: center; gap: 8px; }
  .modal-header-left::before { content: ''; display: inline-block; width: 8px; height: 8px; background: var(--red); }
  .modal-close {
    background: none; border: 2px solid #444; color: var(--white);
    font-family: monospace; font-size: 16px; font-weight: 900;
    width: 36px; height: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .modal-close:hover { border-color: var(--red); background: var(--red); }
  .modal-body { padding: 36px 32px 40px; }
  .modal-cat { font-size: 9px; letter-spacing: 3px; font-weight: 900; color: #bbb; margin-bottom: 14px; }
  .modal-title { font-size: 28px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; line-height: 1.05; }
  .modal-venue { font-size: 10px; letter-spacing: 2px; color: #999; margin-bottom: 6px; }
  .modal-datetime { font-size: 10px; letter-spacing: 2px; color: #bbb; margin-bottom: 28px; }
  .modal-desc { font-size: 12px; letter-spacing: 0.5px; line-height: 2; color: #444; border-left: 3px solid var(--red); padding-left: 18px; margin-bottom: 28px; }
  .modal-tags { display: flex; gap: 10px; flex-wrap: wrap; }
  .modal-tag { font-size: 9px; letter-spacing: 2px; font-weight: 900; border: 1px solid #ddd; padding: 5px 12px; color: #aaa; }

  @media (max-width: 640px) {
    .page { padding: 40px 56px 100px 20px; }
    .eventos-header { padding: 10px 16px; gap: 10px; }
    .header-logo { height: 40px; padding: 4px 10px; }
    .hero { flex-direction: column; gap: 14px; align-items: flex-start; }
    .hero-right { text-align: left; max-width: 100%; }
    .event-row { grid-template-columns: 70px 1fr auto; gap: 0 20px; }
    .row-day { font-size: 28px; }
    .row-title { font-size: 16px; }
    .floating-tab { font-size: 9px; padding: 12px 7px; }
    .modal-body { padding: 24px 20px 28px; }
    .modal-title { font-size: 22px; }
  }
</style>
</head>
<body>

<header class="eventos-header">
  <a href="index.html" class="back-btn">←</a>
  <img src="svg/tutian.svg" alt="TUTÍA" class="header-logo">
  <div class="header-right">
    <span style="color:#000;font-weight:900">/</span>
    <span class="header-section">EVENTOS</span>
  </div>
</header>

<div class="modal-overlay" id="event-modal" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-left" id="modal-header-label"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-venue" id="modal-venue"></div>
      <div class="modal-datetime" id="modal-datetime"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
  </div>
</div>

<div class="page">
  <div class="hero">
    <div>
      <div class="hero-tag">TUTÍA — ESTUDIO CREATIVO</div>
      <div class="hero-title">EVEN<br>TOS</div>
    </div>
    <div class="hero-right">
      Cosas que pasan una vez.<br>Si no estás, no estás.
    </div>
  </div>

  <div class="events-list" id="events-list"></div>
</div>

<a href="estudio.html" class="floating-tab estudio">ESTUDIO</a>
<a href="projects.html" class="floating-tab proyectos">PROYECTOS</a>

<script>
const EVENTS = [
  {
    title: 'ENCUENTRO DE PROCESO',
    cat: 'CHARLA / PANEL',
    day: '08', month: 'ABR', year: '2025', time: '18:30 HS',
    venue: 'TALLER TUTÍA',
    statusLabel: 'PRÓXIMO',
    desc: 'Conversación abierta sobre proceso creativo. No sobre resultados. Dos invitados, sin moderador fijo, sin tema prefijado.',
    tags: ['CHARLA', 'PROCESO', 'ABIERTO'],
  },
  {
    title: 'RESIDENCIA IMPRESIÓN',
    cat: 'RESIDENCIA CREATIVA',
    day: '01', month: 'MAY', year: '2025', time: '2 SEMANAS',
    venue: 'TALLER TUTÍA',
    statusLabel: 'PRÓXIMO',
    desc: 'Residencia breve en torno a la impresión artesanal. Cuatro participantes seleccionados. Resultado: edición de tiraje mínimo.',
    tags: ['RESIDENCIA', 'IMPRESIÓN', 'EDITORIAL'],
  },
  {
    title: 'NOCHE SIN NOMBRE',
    cat: 'MÚSICA EN VIVO',
    day: '14', month: 'JUN', year: '2025', time: '21:00 HS',
    venue: 'POR CONFIRMAR',
    statusLabel: 'PRÓXIMO',
    desc: 'Una noche construida alrededor del silencio entre canciones. Tres actos, ningún presentador. El diseño de sala como parte de la pieza.',
    tags: ['MÚSICA', 'DISEÑO DE ESPACIO', 'PRODUCCIÓN'],
  },
]

function buildList() {
  const list = document.getElementById('events-list')
  EVENTS.forEach(ev => {
    const row = document.createElement('div')
    row.className = 'event-row'
    row.innerHTML = `
      <div class="row-date">
        <div class="row-day">${ev.day}</div>
        <div class="row-month">${ev.month} ${ev.year}</div>
        <div class="row-time">${ev.time}</div>
      </div>
      <div class="row-body">
        <div class="row-cat">${ev.cat}</div>
        <div class="row-title">${ev.title}</div>
        <div class="row-venue">◎ ${ev.venue}</div>
        <div class="row-tags">${ev.tags.map(t => `<span class="row-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="row-right">
        <div class="row-status">${ev.statusLabel}</div>
        <div class="row-arrow">→</div>
      </div>
    `
    row.onclick = () => openModal(ev)
    list.appendChild(row)
  })
}

function openModal(ev) {
  document.getElementById('modal-header-label').textContent = ev.cat
  document.getElementById('modal-cat').textContent = ev.cat
  document.getElementById('modal-title').textContent = ev.title
  document.getElementById('modal-venue').textContent = '◎ ' + ev.venue
  document.getElementById('modal-datetime').textContent = ev.day + ' ' + ev.month + ' ' + ev.year + ' — ' + ev.time
  document.getElementById('modal-desc').textContent = ev.desc
  document.getElementById('modal-tags').innerHTML = ev.tags.map(t => `<span class="modal-tag">${t}</span>`).join('')
  document.getElementById('event-modal').classList.add('open')
  document.body.style.overflow = 'hidden'
}

function closeModal() {
  document.getElementById('event-modal').classList.remove('open')
  document.body.style.overflow = ''
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('event-modal')) closeModal()
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })

buildList()
</script>
</body>
</html>
